appId: io.github.nao7sep.mumbler
productName: Mumbler

directories:
  output: dist
  buildResources: build

# Ship the built app bundle (electron-vite's out/). Production dependencies and
# package.json are included automatically; source and tests are not.
files:
  - out/**
  - package.json

# ffmpeg-static and ffprobe-static ship plain executable binaries that the app
# runs via execFile, resolving their paths through require()/require.resolve at
# runtime. An asar archive would trap those binaries — a path inside app.asar is
# not executable — and the app does not rewrite paths to app.asar.unpacked. So
# disable asar, leaving node_modules as real files whose resolved paths run.
asar: false

# Tahoe "Liquid Glass" icon: the liquid-glass-icon tool deploys build/Assets.car (committed in
# company/assets) here. macOS 26 reads CFBundleIconName below → this catalog; older macOS reads
# CFBundleIconFile → build/icon.icns. Building does NOT need Xcode — the Assets.car is prebuilt.
extraResources:
  - from: build/Assets.car
    to: Assets.car

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  extendInfo:
    CFBundleIconName: broadcast-mic-soundwaves
  target:
    - dmg

win:
  target:
    - nsis
