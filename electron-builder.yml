appId: io.github.nao7sep.mumbler
productName: Mumbler

directories:
  output: dist
  buildResources: build

# Ship the built app bundle (electron-vite's out/). Production dependencies and
# package.json are included automatically; source and tests are not.
files:
  - out/**
  - package.json

# asar stays at its default (enabled): mumbler bundles no executable native
# binaries. ffmpeg and ffprobe are managed downloads fetched at runtime into the
# app data dir (~/.mumbler/bin), never packaged, so there is nothing that an asar
# archive would trap.

# Tahoe "Liquid Glass" icon: the liquid-glass-icon tool deploys build/Assets.car (committed in
# company/assets) here. macOS 26 reads CFBundleIconName below → this catalog; older macOS reads
# CFBundleIconFile → build/icon.icns. Building does NOT need Xcode — the Assets.car is prebuilt.
extraResources:
  - from: build/Assets.car
    to: Assets.car

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  extendInfo:
    CFBundleIconName: broadcast-mic-soundwaves
  target:
    - dmg

win:
  icon: build/icon.ico
  target:
    - nsis
